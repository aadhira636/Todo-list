<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Assignment</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body>
    <div
      class="w-[500px] h-[500px] bg-gray-200 flex item-centre justify-center ml-[450px] mt-[150px]"
    >
      <form onsubmit="signUp(event)">
        <h1
          class="text-2xl font-medium flex item-centre justify-center p-[60px]"
        >
          Sign Up Page
        </h1>
        <div class="flex-col item-centre p-[10px]">
          <div class="flex items-center justify-center gap-10 mb-[30px]">
            <label>Email</label>
            <input
              id="emailInput"
              class="border-[2px]"
              type="email"
              placeholder="   Enter your Email"
              required
            />
          </div>
          <div class="flex items-center justify-center gap-3">
            <label>Password</label>
            <input
              id="passwordInput"
              class="border-[2px]"
              type="password"
              placeholder="   Enter your Password"
              required
            />
          </div>
        </div>
        <div>
          <p id="result"></p>
        </div>
        <div>
          <button
            type="submit"
            class="bg-white flex item-centre justify-center ml-[110px] mt-[20px] w-[100px] h-[30px]"
          >
            Sign Up
          </button>
        </div>
      </form>
    </div>

        // message.textContent = "Form submitted successfully!."

                message.textContent = "Form submitted successfully.";

                let newUser = {
                id: oldUsers.length + 1,
                gmail: email,
                password: newPassword,
                };

                oldUsers.push(newUser);
                console.log(oldUsers);
            }
        }
